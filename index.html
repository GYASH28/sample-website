<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Fakhri Mart | Yarn Store & Craft Supplier</title>
    <meta
      name="description"
      content="Fakhri Mart offers yarns, crochet threads, macrame cords, embroidery threads, beads, purse accessories, bases, handles and craft essentials with all-India delivery and bulk enquiry support."
    />

    <!-- Favicon and Icons -->
    <link rel="icon" type="image/webp" href="/assets/fakhri-mart-logo.webp" />
    <link rel="apple-touch-icon" href="/assets/fakhri-mart-logo.webp" />
    <link rel="shortcut icon" type="image/webp" href="/assets/fakhri-mart-logo.webp" />

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload + load fonts: Playfair Display (display serif) + Inter (body sans) + JetBrains Mono (code) -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />

    <!-- Preload hero image (LCP element) -->
    <link rel="preload" as="image" href="/assets/images/hero_banner.webp" fetchpriority="high" />

    <!-- Preconnect for WhatsApp (primary conversion) -->
    <link rel="preconnect" href="https://wa.me" />
    <link rel="dns-prefetch" href="https://wa.me" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fakhrimart.in" />
    <meta property="og:site_name" content="Fakhri Mart" />
    <meta property="og:locale" content="en_IN" />
    <meta property="og:title" content="Fakhri Mart | Yarn Store & Craft Supplier" />
    <meta property="og:description" content="Fakhri Mart offers yarns, crochet threads, macrame cords, embroidery threads, beads, purse accessories, bases, handles and craft essentials with all-India delivery and bulk enquiry support." />
    <meta property="og:image" content="/assets/fakhri-mart-logo.webp" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@fakhrimart53" />
    <meta property="twitter:title" content="Fakhri Mart | Yarn Store & Craft Supplier" />
    <meta property="twitter:description" content="Fakhri Mart offers yarns, crochet threads, macrame cords, embroidery threads, beads, purse accessories, bases, handles and craft essentials with all-India delivery and bulk enquiry support." />
    <meta property="twitter:image" content="/assets/fakhri-mart-logo.webp" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
